name: Vue DeadFinder CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deadcode-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Run Vue DeadFinder CI Check
        run: |
          # Fails the build if dead files exceed --max-dead-files (e.g. 2, matching test fixtures count)
          node packages/cli/dist/index.js check --project . --max-dead-files 2
